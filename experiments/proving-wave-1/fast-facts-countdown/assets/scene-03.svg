<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1920" fill="url(#bg)"/>
  <rect x="72" y="88" width="936" height="1744" rx="40" fill="#0f172a" fill-opacity="0.22"/>
  <text x="120" y="270" font-family="Helvetica, Arial, sans-serif" font-size="88" font-weight="700" fill="#e0f2fe">FAST FACTS</text>
  <text x="120" y="560" font-family="Helvetica, Arial, sans-serif" font-size="420" font-weight="800" fill="#ffffff">3</text>
  <text x="120" y="760" font-family="Helvetica, Arial, sans-serif" font-size="96" font-weight="700" fill="#bfdbfe">OCTOPUSES</text>
  <text x="120" y="900" font-family="Helvetica, Arial, sans-serif" font-size="72" font-weight="700" fill="#ffffff">They have three hearts.</text>
  <text x="120" y="1040" font-family="Helvetica, Arial, sans-serif" font-size="48" fill="#eff6ff">Two hearts stop beating while</text>
  <text x="120" y="1110" font-family="Helvetica, Arial, sans-serif" font-size="48" fill="#eff6ff">the octopus swims.</text>
</svg>
