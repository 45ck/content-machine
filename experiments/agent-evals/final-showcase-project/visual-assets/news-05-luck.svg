  <text x="124" y="346" fill="#A1A1AA" font-size="56" font-family="Arial, sans-serif" font-weight="700">WHY THIS FEELS DIFFERENT</text>
  <text x="124" y="584" fill="#FFFFFF" font-size="128" font-family="Arial, sans-serif" font-weight="900">DAMAGE</text>
  <text x="124" y="716" fill="#FFFFFF" font-size="128" font-family="Arial, sans-serif" font-weight="900">THIS BAD</text>
