  <text x="126" y="320" fill="#D1FAE5" font-size="56" font-family="Arial, sans-serif" font-weight="700">TAKEAWAY</text>
  <text x="126" y="544" fill="#FFFFFF" font-size="124" font-family="Arial, sans-serif" font-weight="900">PREP.</text>
