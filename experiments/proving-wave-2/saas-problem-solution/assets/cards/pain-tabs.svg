<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#020617" flood-opacity="0.42"/>
    </filter>
  </defs>
  <rect x="72" y="90" width="338" height="64" rx="32" fill="#1D4ED8" />
  <text x="110" y="131" fill="#DBEAFE" font-size="32" font-family="DejaVu Sans" font-weight="700">WORKFLOW FRICTION</text>
  <text x="72" y="248" fill="#F8FAFC" font-size="76" font-family="DejaVu Sans" font-weight="800">Tabs open.</text>
  <text x="72" y="334" fill="#F8FAFC" font-size="76" font-family="DejaVu Sans" font-weight="800">Notes everywhere.</text>
  <text x="72" y="406" fill="#CBD5E1" font-size="34" font-family="DejaVu Sans">The next step starts disappearing the second the call ends.</text>
  <g filter="url(#shadow)">
    <rect x="72" y="520" width="936" height="760" rx="48" fill="#0F172A" fill-opacity="0.9"/>
    <rect x="120" y="588" width="408" height="496" rx="32" fill="#111827"/>
    <rect x="552" y="588" width="408" height="496" rx="32" fill="#111827"/>
    <rect x="156" y="642" width="336" height="60" rx="20" fill="#1E293B"/>
    <rect x="588" y="642" width="336" height="60" rx="20" fill="#1E293B"/>
    <text x="182" y="681" fill="#E2E8F0" font-size="28" font-family="DejaVu Sans" font-weight="700">Call notes</text>
    <text x="614" y="681" fill="#E2E8F0" font-size="28" font-family="DejaVu Sans" font-weight="700">CRM tab</text>
    <rect x="156" y="748" width="230" height="88" rx="24" fill="#334155"/>
    <text x="188" y="804" fill="#F8FAFC" font-size="32" font-family="DejaVu Sans">Send recap</text>
    <rect x="276" y="864" width="188" height="88" rx="24" fill="#475569"/>
    <text x="308" y="920" fill="#F8FAFC" font-size="32" font-family="DejaVu Sans">Update opp</text>
    <rect x="172" y="988" width="250" height="88" rx="24" fill="#64748B"/>
    <text x="204" y="1044" fill="#F8FAFC" font-size="32" font-family="DejaVu Sans">Book follow-up</text>
    <rect x="612" y="756" width="272" height="74" rx="20" fill="#0B1220" stroke="#334155"/>
    <text x="644" y="804" fill="#94A3B8" font-size="30" font-family="DejaVu Sans">Next step</text>
    <rect x="612" y="856" width="272" height="74" rx="20" fill="#0B1220" stroke="#334155"/>
    <text x="644" y="904" fill="#94A3B8" font-size="30" font-family="DejaVu Sans">Owner</text>
    <rect x="612" y="956" width="272" height="74" rx="20" fill="#0B1220" stroke="#334155"/>
    <text x="644" y="1004" fill="#94A3B8" font-size="30" font-family="DejaVu Sans">Due date</text>
    <rect x="120" y="1124" width="840" height="96" rx="28" fill="#172033"/>
    <circle cx="172" cy="1172" r="14" fill="#F59E0B"/>
    <text x="210" y="1184" fill="#E2E8F0" font-size="32" font-family="DejaVu Sans">Every extra surface increases the chance the real next step gets lost.</text>
  </g>
</svg>

