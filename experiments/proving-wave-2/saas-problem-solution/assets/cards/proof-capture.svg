<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#020617" flood-opacity="0.42"/>
    </filter>
  </defs>
  <rect x="72" y="90" width="360" height="64" rx="32" fill="#0F766E" />
  <text x="110" y="131" fill="#CCFBF1" font-size="32" font-family="DejaVu Sans" font-weight="700">PROOF: CAPTURE</text>
  <text x="72" y="246" fill="#F8FAFC" font-size="74" font-family="DejaVu Sans" font-weight="800">Transcript to actions</text>
  <text x="72" y="316" fill="#CBD5E1" font-size="34" font-family="DejaVu Sans">The important parts are already tagged when the call ends.</text>
  <g filter="url(#shadow)">
    <rect x="72" y="456" width="936" height="900" rx="56" fill="#0F172A" fill-opacity="0.9"/>
    <rect x="116" y="524" width="512" height="730" rx="36" fill="#F8FAFC"/>
    <rect x="658" y="524" width="302" height="330" rx="30" fill="#111827"/>
    <rect x="658" y="890" width="302" height="364" rx="30" fill="#111827"/>
    <text x="156" y="596" fill="#0F172A" font-size="30" font-family="DejaVu Sans" font-weight="700">Conversation transcript</text>
    <rect x="152" y="642" width="436" height="90" rx="20" fill="#DBEAFE"/>
    <text x="176" y="696" fill="#0F172A" font-size="26" font-family="DejaVu Sans">We need a security review before pilot.</text>
    <rect x="152" y="764" width="436" height="90" rx="20" fill="#DCFCE7"/>
    <text x="176" y="818" fill="#0F172A" font-size="26" font-family="DejaVu Sans">Champion asked for pricing recap by Friday.</text>
    <rect x="152" y="886" width="436" height="90" rx="20" fill="#FDE68A"/>
    <text x="176" y="940" fill="#0F172A" font-size="26" font-family="DejaVu Sans">Next meeting should include RevOps owner.</text>
    <text x="694" y="590" fill="#5EEAD4" font-size="28" font-family="DejaVu Sans" font-weight="700">Detected objections</text>
    <text x="694" y="652" fill="#E2E8F0" font-size="24" font-family="DejaVu Sans">Security</text>
    <text x="694" y="700" fill="#E2E8F0" font-size="24" font-family="DejaVu Sans">Timing</text>
    <text x="694" y="748" fill="#E2E8F0" font-size="24" font-family="DejaVu Sans">Procurement</text>
    <text x="694" y="956" fill="#86EFAC" font-size="28" font-family="DejaVu Sans" font-weight="700">Action items</text>
    <text x="694" y="1018" fill="#E2E8F0" font-size="24" font-family="DejaVu Sans">Send security packet</text>
    <text x="694" y="1062" fill="#E2E8F0" font-size="24" font-family="DejaVu Sans">Book Friday follow-up</text>
    <text x="694" y="1106" fill="#E2E8F0" font-size="24" font-family="DejaVu Sans">Share pricing recap</text>
