<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#020617" flood-opacity="0.42"/>
    </filter>
    <linearGradient id="brand" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
  </defs>
  <rect x="72" y="90" width="250" height="64" rx="32" fill="url(#brand)" />
  <text x="112" y="131" fill="#E0F2FE" font-size="32" font-family="DejaVu Sans" font-weight="700">SOLUTION</text>
  <text x="72" y="246" fill="#F8FAFC" font-size="76" font-family="DejaVu Sans" font-weight="800">Meet CallScribe</text>
  <text x="72" y="318" fill="#CBD5E1" font-size="34" font-family="DejaVu Sans">A clean recap appears before the rep closes the laptop.</text>
  <g filter="url(#shadow)">
    <rect x="72" y="456" width="936" height="892" rx="56" fill="#0F172A" fill-opacity="0.9"/>
    <rect x="120" y="518" width="240" height="72" rx="24" fill="#172554"/>
    <text x="156" y="564" fill="#BFDBFE" font-size="32" font-family="DejaVu Sans" font-weight="700">CallScribe</text>
    <rect x="120" y="638" width="840" height="604" rx="38" fill="#F8FAFC"/>
    <rect x="162" y="684" width="320" height="470" rx="26" fill="#E2E8F0"/>
    <rect x="516" y="684" width="402" height="144" rx="24" fill="#DBEAFE"/>
    <rect x="516" y="852" width="402" height="144" rx="24" fill="#DCFCE7"/>
    <rect x="516" y="1020" width="402" height="134" rx="24" fill="#F1F5F9"/>
    <text x="198" y="746" fill="#0F172A" font-size="30" font-family="DejaVu Sans" font-weight="700">Live call summary</text>
    <text x="198" y="808" fill="#475569" font-size="26" font-family="DejaVu Sans">Customer wants rollout by next month.</text>
    <text x="198" y="860" fill="#475569" font-size="26" font-family="DejaVu Sans">Security review needed before pilot.</text>
    <text x="198" y="912" fill="#475569" font-size="26" font-family="DejaVu Sans">Champion asked for pricing recap.</text>
    <text x="548" y="746" fill="#1D4ED8" font-size="28" font-family="DejaVu Sans" font-weight="700">Action items</text>
    <text x="548" y="798" fill="#0F172A" font-size="26" font-family="DejaVu Sans">Send security packet</text>
    <text x="548" y="906" fill="#166534" font-size="28" font-family="DejaVu Sans" font-weight="700">Next meeting</text>
    <text x="548" y="958" fill="#0F172A" font-size="26" font-family="DejaVu Sans">Thursday 2:00 PM with RevOps</text>
    <text x="548" y="1068" fill="#334155" font-size="28" font-family="DejaVu Sans" font-weight="700">CRM draft ready</text>
    <text x="548" y="1120" fill="#0F172A" font-size="26" font-family="DejaVu Sans">Owner, note, and next step prefilled</text>
  </g>
</svg>

