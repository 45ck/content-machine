<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#020617" flood-opacity="0.44"/>
    </filter>
  </defs>
  <rect x="72" y="90" width="286" height="64" rx="32" fill="#7C3AED" />
  <text x="110" y="131" fill="#EDE9FE" font-size="32" font-family="DejaVu Sans" font-weight="700">HIDDEN COST</text>
  <text x="72" y="248" fill="#F8FAFC" font-size="74" font-family="DejaVu Sans" font-weight="800">The call was fine.</text>
  <text x="72" y="332" fill="#F8FAFC" font-size="74" font-family="DejaVu Sans" font-weight="800">The follow-up was not.</text>
  <text x="72" y="402" fill="#CBD5E1" font-size="34" font-family="DejaVu Sans">This is where speed, consistency, and close rate quietly slip.</text>
  <g filter="url(#shadow)">
    <rect x="72" y="520" width="936" height="740" rx="48" fill="#0F172A" fill-opacity="0.9"/>
    <rect x="120" y="604" width="248" height="252" rx="32" fill="#111827"/>
    <rect x="416" y="604" width="248" height="252" rx="32" fill="#111827"/>
    <rect x="712" y="604" width="248" height="252" rx="32" fill="#111827"/>
    <text x="158" y="676" fill="#94A3B8" font-size="28" font-family="DejaVu Sans" font-weight="700">FOLLOW-UP LAG</text>
    <text x="158" y="792" fill="#F8FAFC" font-size="82" font-family="DejaVu Sans" font-weight="800">+22%</text>
    <text x="454" y="676" fill="#94A3B8" font-size="28" font-family="DejaVu Sans" font-weight="700">MISSED ACTIONS</text>
    <text x="454" y="792" fill="#F8FAFC" font-size="82" font-family="DejaVu Sans" font-weight="800">3x</text>
    <text x="750" y="676" fill="#94A3B8" font-size="28" font-family="DejaVu Sans" font-weight="700">PIPELINE RISK</text>
    <text x="750" y="792" fill="#F8FAFC" font-size="82" font-family="DejaVu Sans" font-weight="800">High</text>
    <rect x="120" y="928" width="840" height="220" rx="32" fill="#111827"/>
    <text x="164" y="1008" fill="#F8FAFC" font-size="40" font-family="DejaVu Sans" font-weight="700">Quiet losses are still losses</text>
    <text x="164" y="1070" fill="#CBD5E1" font-size="32" font-family="DejaVu Sans">No one notices the missed summary until a follow-up stalls,</text>
    <text x="164" y="1116" fill="#CBD5E1" font-size="32" font-family="DejaVu Sans">an owner changes, or the handoff turns vague.</text>
  </g>
</svg>

