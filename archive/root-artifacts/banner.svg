<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" fill="none">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1035"/>
      <stop offset="50%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#1b2838"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- Decorative: film strip frames -->
  <g opacity="0.08">
    <rect x="50" y="60" width="80" height="60" rx="4" stroke="#7c3aed" stroke-width="2"/>
    <rect x="50" y="140" width="80" height="60" rx="4" stroke="#7c3aed" stroke-width="2"/>
    <rect x="50" y="220" width="80" height="60" rx="4" stroke="#7c3aed" stroke-width="2"/>
    <rect x="50" y="300" width="80" height="60" rx="4" stroke="#7c3aed" stroke-width="2"/>
    <!-- Sprocket holes -->
    <circle cx="62" cy="55" r="4" stroke="#7c3aed" stroke-width="1.5"/>
    <circle cx="118" cy="55" r="4" stroke="#7c3aed" stroke-width="1.5"/>
    <circle cx="62" cy="135" r="4" stroke="#7c3aed" stroke-width="1.5"/>
    <circle cx="118" cy="135" r="4" stroke="#7c3aed" stroke-width="1.5"/>
    <circle cx="62" cy="215" r="4" stroke="#7c3aed" stroke-width="1.5"/>
    <circle cx="118" cy="215" r="4" stroke="#7c3aed" stroke-width="1.5"/>
    <circle cx="62" cy="295" r="4" stroke="#7c3aed" stroke-width="1.5"/>
    <circle cx="118" cy="295" r="4" stroke="#7c3aed" stroke-width="1.5"/>
  </g>

  <!-- Decorative: waveform lines on right -->
  <g opacity="0.08" transform="translate(1050, 100)">
    <line x1="0" y1="0" x2="0" y2="200" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
    <line x1="15" y1="30" x2="15" y2="170" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
    <line x1="30" y1="60" x2="30" y2="140" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
    <line x1="45" y1="20" x2="45" y2="180" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
    <line x1="60" y1="50" x2="60" y2="150" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
    <line x1="75" y1="10" x2="75" y2="190" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
    <line x1="90" y1="40" x2="90" y2="160" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Decorative: play button -->
  <g opacity="0.06" transform="translate(200, 280)">
    <polygon points="0,0 40,25 0,50" stroke="#7c3aed" stroke-width="2" fill="none"/>
  </g>

  <!-- Decorative: pipeline arrows -->
  <g opacity="0.06">
    <line x1="300" y1="320" x2="400" y2="320" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
    <polygon points="400,315 415,320 400,325" fill="#3b82f6"/>
    <line x1="440" y1="320" x2="540" y2="320" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
    <polygon points="540,315 555,320 540,325" fill="#3b82f6"/>
    <line x1="580" y1="320" x2="680" y2="320" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
    <polygon points="680,315 695,320 680,325" fill="#3b82f6"/>
    <line x1="720" y1="320" x2="820" y2="320" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
    <polygon points="820,315 835,320 820,325" fill="#3b82f6"/>
  </g>

  <!-- Title -->
  <text x="600" y="170" text-anchor="middle" font-family="'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="64" font-weight="bold" fill="#a78bfa">
    Content Machine
  </text>

  <!-- Subtitle -->
  <text x="600" y="225" text-anchor="middle" font-family="'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="22" fill="#8b949e">
    CLI-first automated short-form video generator for TikTok, Reels, and Shorts
  </text>

  <!-- Accent line -->
  <rect x="450" y="250" width="300" height="2" rx="1" fill="url(#accent)" opacity="0.5"/>
</svg>
